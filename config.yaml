# Bot behaviour
settings:
  headless: false           # false = see the browser (recommended while testing)
  slow_mo: 500              # ms between actions
  pause_between_jobs: 3     # seconds between each job
  skip_if_already_applied: true
  skip_promoted: false
  log_level: "INFO"         # DEBUG | INFO | WARNING | ERROR

  # Set to true to ONLY process jobs from companies in target_companies list above.
  # Set to false to process all companies (still excludes titles via exclude_title_keywords).
  target_companies_only: false
