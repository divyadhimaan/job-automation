# LinkedIn Job Automation Config

# MongoDB Atlas connection string
# Free tier: https://cloud.mongodb.com → New Project → Free Cluster → Connect → Drivers
# Replace <user>, <password>, <cluster> with your values.
# For local dev, use: mongodb://localhost:27017/jobbot
mongodb_uri: "mongodb+srv://<user>:<password>@<cluster>.mongodb.net/jobbot?retryWrites=true&w=majority"

linkedin:
  email: "dhimandivya713@gmail.com"
  # password not needed — you log in manually in the browser window

search:
  # Role keywords — used as the LinkedIn keyword search
  role_keywords:
    - "SDE II"
    - "Software Development Engineer II"
    - "Backend Engineer"
    - "Java Developer"
    - "Full Stack Developer"
    - "Software Engineer"
    - "Cloud Engineer"
    - "Data Engineer"
    - "Platform Engineer"

  # Kept as fallback if target_companies have no linkedin_id set
  keywords:
    - "Software Engineer"
    - "Backend Engineer"

  # Precise location via LinkedIn geoId (more reliable than string location)
  # Bengaluru, Karnataka, India = 105214831
  geo_id: 105214831
  distance_km: 50
  location: "Bengaluru"     # fallback if geo_id not used

  remote: true              # include remote roles
  experience_levels:
    - "associate"
    - "mid_senior"
  job_types:
    - "full_time"
  date_posted: "day"        # day | week | month  (day = last 24 h — good for target companies)
  max_jobs: 100

  # Title keywords to skip
  exclude_title_keywords:
    - "Senior"
    - "Sr."
    - "Principal"
    - "Staff"
    - "Lead"
    - "Manager"
    - "Architect"
    - "Director"
    - "VP"
    - "Head of"
    - "Chief"

# Easy Apply auto-fill answers
easy_apply:
  phone: ""                 # ← add your phone number
  years_of_experience:
    default: 3
    java: 3
    python: 3
    javascript: 2
    sql: 3
    aws: 2
    react: 2
    spring: 3
    mongodb: 2
    postgresql: 2
  boolean_answers:
    authorized_to_work: true
    require_sponsorship: false
    willing_to_relocate: false
    have_bachelors_degree: true
  cover_letter: ""

